{% extends "base.html" %}
{% block title %}Check Your Email{% endblock %}
{% block content %}
<div class="card shadow-sm">
  <div class="card-body p-4 text-center">
    <h3 class="mb-3">Check your email</h3>
    <p class="text-muted">If an account exists for that address, a reset link is on its way.</p>
    <a href="{% url 'accounts:login' %}" class="btn btn-outline-secondary mt-2">Back to login</a>
  </div>
</div>
{% endblock %}
