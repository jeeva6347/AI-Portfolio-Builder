{% extends "base.html" %}

{% block title %}Check Your Email | AI Portfolio Builder{% endblock %}

{% block content %}
<div class="glass-card rounded-2xl shadow-xl p-5 sm:p-8 text-center animate__animated animate__fadeIn">
  <div class="bg-blue-500/10 text-blue-400 rounded-circle d-flex align-items-center justify-content-center mx-auto mb-4" style="width: 60px; height: 60px;">
    <i class="bi bi-envelope-check-fill fs-3"></i>
  </div>
  <h3 class="text-xl font-black text-white mb-2">Check Your Email</h3>
  <p class="text-gray-400 text-xs leading-relaxed mb-4">
    We have sent a secure password reset link to your email address if it exists in our system. Please check your inbox and spam folder.
  </p>
  <a href="{% url 'accounts:login' %}" class="btn btn-outline-secondary rounded-full px-4 text-xs font-semibold text-white border-white/10 hover:bg-white/5 w-100 transition">
    Back to Login
  </a>
</div>
{% endblock %}
