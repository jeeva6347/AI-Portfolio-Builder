{% extends "base.html" %}

{% block title %}Password Reset Complete | AI Portfolio Builder{% endblock %}

{% block content %}
<div class="glass-card rounded-2xl shadow-xl p-5 sm:p-8 text-center animate__animated animate__fadeIn">
  <div class="bg-green-500/10 text-green-400 rounded-circle d-flex align-items-center justify-content-center mx-auto mb-4" style="width: 60px; height: 60px;">
    <i class="bi bi-patch-check-fill fs-3"></i>
  </div>
  <h3 class="text-xl font-black text-white mb-2">Password Reset Successful</h3>
  <p class="text-gray-400 text-xs leading-relaxed mb-4">
    Your password has been reset successfully. You can now use your new password to sign in.
  </p>
  <a href="{% url 'accounts:login' %}" class="btn btn-primary rounded-full px-4 py-2 text-xs font-semibold w-100 tracking-wide shadow-lg shadow-blue-500/20 hover:scale-[1.01] transition">
    Sign In
  </a>
</div>
{% endblock %}
