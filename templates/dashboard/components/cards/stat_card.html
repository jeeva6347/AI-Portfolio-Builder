<!-- Premium stat card component -->
<div class="stat-card anim-fade-up">
    <div class="d-flex align-items-start justify-content-between gap-3">
        <div class="flex-grow-1">
            <p class="stat-card-label">{{ title }}</p>
            <h3 class="stat-card-value">{{ value }}</h3>
            {% if growth %}
            <p class="mt-1 mb-0" style="font-size:12px;font-weight:600;{% if growth > 0 %}color:var(--success){% else %}color:var(--danger){% endif %};">
                <i class="bi {% if growth > 0 %}bi-arrow-up-right{% else %}bi-arrow-down-right{% endif %}"></i>
                {{ growth }}% vs last month
            </p>
            {% endif %}
            {% if link %}
            <a href="{{ link }}" class="stat-card-link">View details <i class="bi bi-arrow-right"></i></a>
            {% endif %}
        </div>
        {% if icon %}
        <div class="stat-card-icon {{ icon_class|default:'stat-icon-blue' }}">
            <i class="bi {{ icon }}"></i>
        </div>
        {% endif %}
    </div>
</div>
