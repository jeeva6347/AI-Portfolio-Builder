<a href="{{ url }}" class="block p-4 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 {{ color|default:'bg-white dark:bg-gray-800' }} hover:shadow-md transition duration-200 text-center text-gray-900 dark:text-white hover:text-blue-600 dark:hover:text-blue-400 text-decoration-none">
    <i class="bi {{ icon }} text-3xl mb-2 block {{ icon_color|default:'text-blue-500' }}"></i>
    <span class="font-semibold">{{ title }}</span>
</a>
