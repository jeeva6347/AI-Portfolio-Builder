{% load static %}
<div class="offcanvas-lg offcanvas-start bg-white dark:bg-gray-800 border-end border-gray-200 dark:border-gray-700 transition-all duration-300 z-40 shadow-sm" tabindex="-1" id="sidebarOffcanvas" aria-labelledby="sidebarOffcanvasLabel" style="width: 260px;">
    
    <!-- Sidebar Header -->
    <div class="offcanvas-header border-b border-gray-100 dark:border-gray-700 p-4 d-flex align-items-center justify-content-between">
        <a href="{% url 'accounts:dashboard_redirect' %}" class="text-decoration-none d-flex align-items-center gap-2 overflow-hidden">
            <div class="bg-blue-600 text-white rounded p-1 flex items-center justify-center flex-shrink-0">
                <i class="bi bi-box-fill text-xl"></i>
            </div>
            <span class="fs-5 fw-bold text-gray-900 dark:text-white tracking-tight text-nowrap sidebar-text">AI Portfolio</span>
        </a>
        <button type="button" class="btn-close d-lg-none dark:filter-white" data-bs-dismiss="offcanvas" data-bs-target="#sidebarOffcanvas" aria-label="Close"></button>
    </div>

    <!-- Sidebar Body / Navigation -->
    <div class="offcanvas-body p-3 flex-column overflow-y-auto overflow-x-hidden">
        <p class="text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-3 px-2 sidebar-text">Menu</p>
        
        <ul class="nav nav-pills flex-column gap-1 mb-auto">
            {% for item in sidebar_nav %}
            <li class="nav-item">
                <a href="{{ item.url }}" class="nav-link d-flex align-items-center gap-3 px-3 py-2.5 rounded-lg transition-colors duration-200 {% if request.path == item.url %}active bg-blue-50 text-blue-700 dark:bg-blue-900/50 dark:text-blue-400 fw-medium{% else %}text-gray-600 dark:text-gray-400 hover:bg-gray-50 hover:text-gray-900 dark:hover:bg-gray-700 dark:hover:text-white{% endif %}" title="{{ item.title }}">
                    <i class="bi {{ item.icon }} text-lg flex-shrink-0"></i>
                    <span class="sidebar-text text-nowrap">{{ item.title }}</span>
                    {% if item.coming_soon %}
                    <span class="badge bg-gray-200 text-gray-600 dark:bg-gray-700 dark:text-gray-300 ms-auto text-xs rounded-pill sidebar-text">Soon</span>
                    {% elif item.badge %}
                    <span class="badge bg-blue-100 text-blue-600 dark:bg-blue-900 dark:text-blue-300 ms-auto text-xs rounded-pill sidebar-text">{{ item.badge }}</span>
                    {% endif %}
                </a>
            </li>
            {% endfor %}
        </ul>
        
        <!-- Bottom section (collapse toggle for desktop) -->
        <div class="mt-auto pt-3 border-t border-gray-100 dark:border-gray-700 d-none d-lg-block">
            <button id="sidebarToggleBtn" class="btn btn-link text-gray-500 dark:text-gray-400 text-decoration-none w-100 d-flex align-items-center justify-content-center hover:bg-gray-50 dark:hover:bg-gray-700 rounded py-2">
                <i class="bi bi-chevron-bar-left text-xl transition-transform duration-300" id="sidebarToggleIcon"></i>
            </button>
        </div>
    </div>
</div>
