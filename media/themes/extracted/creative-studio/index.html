<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Creative Studio Portfolio</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #fafafa; color: #171717; padding: 2rem; max-width: 900px; margin: 0 auto; }
        .hero { padding: 4rem 0; border-bottom: 2px solid #e5e5e5; }
        h1 { font-size: 3.5rem; letter-spacing: -1px; margin: 0; color: #4f46e5; }
        .title { font-size: 1.75rem; font-weight: 300; margin-top: 0.5rem; }
        .about { font-size: 1.1rem; line-height: 1.8; }
        .gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 2rem; }
        .gallery-item { background: #fff; padding: 1rem; border: 1px solid #e5e5e5; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="hero">
        <h1 class="studio-name">Sophia Sterling</h1>
        <p class="studio-title">Visual Designer & Art Director</p>
    </div>
    
    <h2>Concept</h2>
    <p class="studio-about">Crafting beautiful user interfaces and identity designs that tell a visual story across digital and print media.</p>

    <h2>Featured Work</h2>
    <div class="studio-projects">
        <div class="studio-project-item">
            <h3 class="studio-project-title">Brand Identity</h3>
            <p class="studio-project-desc">Complete visual design overhaul for a modern sustainable clothing label.</p>
        </div>
    </div>
</body>
</html>
