services:
  - type: web
    name: aiportfoliobuilder
    env: python
    buildCommand: "bash build.sh"
    startCommand: "gunicorn aiportfoliobuilder.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: aiportfolio_db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true

databases:
  - name: aiportfolio_db
    databaseName: aiportfolio_db
    user: db_user
    plan: free
