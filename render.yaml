services:
  - type: web
    name: aiportfoliobuilder
    env: python
    buildCommand: "bash build.sh"
    startCommand: "gunicorn aiportfoliobuilder.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: aiportfolio_db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: SITE_DOMAIN
        value: ai-portfolio-builder-icmv.onrender.com
      # Set these values in the Render dashboard (they are intentionally not
      # committed here): GOOGLE_OAUTH_CLIENT_ID, GOOGLE_OAUTH_CLIENT_SECRET,
      # GITHUB_OAUTH_CLIENT_ID, and GITHUB_OAUTH_CLIENT_SECRET.

databases:
  - name: aiportfolio_db
    databaseName: aiportfolio_db
    user: db_user
    plan: free
